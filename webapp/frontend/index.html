<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Provider Catalogue Reconciliation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy:  { 950:'#050d1a', 900:'#0f172a', 800:'#1e293b', 700:'#253347', 600:'#334155' },
            brand: { 400:'#60a5fa', 500:'#3b82f6', 600:'#2563eb' },
          }
        }
      }
    }
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { background: #0f172a; color: #f1f5f9; font-family: 'Inter', system-ui, sans-serif; margin: 0; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

    @keyframes pulse-ring {
      0%   { transform: scale(1);   opacity: 1; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    .pulse-ring { animation: pulse-ring 1.5s ease-out infinite; }

    @keyframes fade-in { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fade-in 0.3s ease forwards; }

    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, #1e293b 25%, #2d3f55 50%, #1e293b 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite;
    }

    .progress-bar-inner {
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
    }

    .badge-exact        { background:#064e3b; color:#6ee7b7; }
    .badge-fuzzy        { background:#1e3a5f; color:#93c5fd; }
    .badge-fuzzy-cat    { background:#312e81; color:#c4b5fd; }
    .badge-unmatched    { background:#450a0a; color:#fca5a5; }
    .badge-skipped      { background:#1c1917; color:#a8a29e; }

    input[type="text"]:focus { outline: none; }
    .table-row-hover:hover td { background: #253347; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ═══════════════════════════════════════════════════════════════════
// Utility helpers
// ═══════════════════════════════════════════════════════════════════
const fmt_pct = (n) => n == null ? '' : `${Math.round(n * 100)}%`;
const badge_class = (mt) => {
  if (!mt) return 'badge-unmatched';
  if (mt === 'exact') return 'badge-exact';
  if (mt === 'fuzzy') return 'badge-fuzzy';
  if (mt === 'fuzzy-catalogue') return 'badge-fuzzy-cat';
  if (mt === 'SKIPPED') return 'badge-skipped';
  return 'badge-unmatched';
};
const badge_label = (mt) => {
  if (!mt || mt === 'UNMATCHED') return 'UNMATCHED';
  if (mt === 'exact') return 'EXACT';
  if (mt === 'fuzzy') return 'FUZZY';
  if (mt === 'fuzzy-catalogue') return 'FUZZY-CAT';
  return mt.toUpperCase();
};

// ═══════════════════════════════════════════════════════════════════
// Header
// ═══════════════════════════════════════════════════════════════════
function Header({ phase }) {
  const steps = ['upload', 'processing', 'reconcile', 'finalize'];
  const labels = ['Upload', 'Processing', 'Reconcile', 'Finalise'];
  const idx = steps.indexOf(phase);
  return (
    <header className="border-b border-navy-600 bg-navy-900 px-6 py-3 flex items-center gap-6 sticky top-0 z-40">
      <div className="flex items-center gap-2">
        <div className="w-8 h-8 rounded-lg bg-brand-500 flex items-center justify-center">
          <svg viewBox="0 0 24 24" fill="none" className="w-5 h-5 text-white" stroke="currentColor" strokeWidth="2">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
        </div>
        <span className="font-semibold text-white text-sm tracking-wide">Catalogue Reconciliation</span>
      </div>
      <nav className="hidden sm:flex items-center gap-1 ml-auto">
        {labels.map((label, i) => (
          <div key={i} className="flex items-center gap-1">
            {i > 0 && <div className={`w-6 h-px ${i <= idx ? 'bg-brand-500' : 'bg-navy-600'}`} />}
            <span className={`text-xs px-2 py-1 rounded-full font-medium ${
              i === idx ? 'bg-brand-600 text-white' :
              i < idx   ? 'text-brand-400' : 'text-slate-500'
            }`}>{label}</span>
          </div>
        ))}
      </nav>
    </header>
  );
}

// ═══════════════════════════════════════════════════════════════════
// Upload Phase — chat-style
// ═══════════════════════════════════════════════════════════════════
function UploadPhase({ onUpload }) {
  const [dragging, setDragging] = useState(false);
  const inputRef = useRef(null);

  const handleFile = (file) => {
    if (!file) return;
    onUpload(file);
  };

  const onDrop = (e) => {
    e.preventDefault();
    setDragging(false);
    const file = e.dataTransfer.files[0];
    handleFile(file);
  };

  return (
    <div className="min-h-[calc(100vh-56px)] flex flex-col items-center justify-center px-4 py-12">
      {/* Bot bubble */}
      <div className="fade-in w-full max-w-xl mb-8">
        <div className="flex items-start gap-3">
          <div className="w-9 h-9 rounded-full bg-brand-600 flex items-center justify-center flex-shrink-0 mt-1">
            <svg viewBox="0 0 24 24" fill="none" className="w-5 h-5 text-white" stroke="currentColor" strokeWidth="2">
              <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
            </svg>
          </div>
          <div className="bg-navy-800 rounded-2xl rounded-tl-none px-5 py-4 max-w-lg shadow-lg">
            <p className="text-slate-200 text-sm leading-relaxed">
              Hello! I'm your Lab Assistant. Upload a provider catalogue file and I'll match every test name against the master catalogue for you.
            </p>
            <p className="text-slate-400 text-xs mt-2">Supports <span className="text-slate-300">.xlsx · .xls · .pdf · .docx · .csv</span></p>
          </div>
        </div>
      </div>

      {/* Drop zone */}
      <div
        className={`fade-in w-full max-w-xl rounded-2xl border-2 border-dashed transition-all duration-200 cursor-pointer
          ${dragging ? 'border-brand-400 bg-brand-600/10' : 'border-navy-600 bg-navy-800 hover:border-brand-500/60 hover:bg-navy-800/80'}`}
        style={{ animationDelay: '0.15s' }}
        onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={onDrop}
        onClick={() => inputRef.current?.click()}
      >
        <input ref={inputRef} type="file"
          accept=".xlsx,.xls,.pdf,.docx,.doc,.csv"
          className="hidden"
          onChange={(e) => handleFile(e.target.files?.[0])} />

        <div className="flex flex-col items-center gap-4 py-14 px-6 text-center">
          <div className={`relative w-16 h-16 rounded-2xl flex items-center justify-center transition-colors ${dragging ? 'bg-brand-500/20' : 'bg-navy-700'}`}>
            {dragging && <div className="absolute inset-0 rounded-2xl pulse-ring bg-brand-400/30" />}
            <svg viewBox="0 0 24 24" fill="none" className={`w-8 h-8 transition-colors ${dragging ? 'text-brand-400' : 'text-slate-400'}`} stroke="currentColor" strokeWidth="1.5">
              <path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
          </div>
          <div>
            <p className={`font-semibold text-base ${dragging ? 'text-brand-300' : 'text-slate-200'}`}>
              {dragging ? 'Drop it here' : 'Drag & drop your catalogue file'}
            </p>
            <p className="text-slate-500 text-sm mt-1">or click to browse</p>
          </div>
          <div className="flex gap-2 flex-wrap justify-center">
            {['XLSX','PDF','DOCX','CSV'].map(t => (
              <span key={t} className="text-xs px-2 py-1 rounded bg-navy-700 text-slate-400 font-mono">{t}</span>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// Processing / Progress
// ═══════════════════════════════════════════════════════════════════
function ProcessingPhase({ filename, progress, step, error }) {
  const steps = [
    { label: 'Checking dependencies', at: 5 },
    { label: 'Parsing file',          at: 15 },
    { label: 'Extracting test names', at: 25 },
    { label: 'Running match engine',  at: 45 },
    { label: 'Applying fuzzy logic',  at: 70 },
    { label: 'Organising results',    at: 85 },
    { label: 'Finalising',            at: 95 },
  ];

  return (
    <div className="min-h-[calc(100vh-56px)] flex flex-col items-center justify-center px-4">
      <div className="w-full max-w-md fade-in">
        <div className="bg-navy-800 rounded-2xl p-8 shadow-xl border border-navy-600">
          {error ? (
            <div className="text-center">
              <div className="w-14 h-14 rounded-full bg-red-500/10 flex items-center justify-center mx-auto mb-4">
                <svg viewBox="0 0 24 24" fill="none" className="w-7 h-7 text-red-400" stroke="currentColor" strokeWidth="2">
                  <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
              </div>
              <p className="text-red-400 font-semibold mb-2">Processing failed</p>
              <p className="text-slate-400 text-sm font-mono whitespace-pre-wrap text-left bg-navy-900 rounded-lg p-3 mt-3 max-h-48 overflow-y-auto">{error}</p>
            </div>
          ) : (
            <>
              <div className="flex items-center gap-3 mb-6">
                <div className="relative w-10 h-10 flex-shrink-0">
                  <div className="absolute inset-0 rounded-full bg-brand-500/20 pulse-ring" />
                  <div className="w-10 h-10 rounded-full bg-brand-600 flex items-center justify-center">
                    <svg viewBox="0 0 24 24" fill="none" className="w-5 h-5 text-white animate-spin" stroke="currentColor" strokeWidth="2">
                      <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                    </svg>
                  </div>
                </div>
                <div>
                  <p className="font-semibold text-white text-sm">Processing {filename}</p>
                  <p className="text-slate-400 text-xs mt-0.5">{step || 'Starting…'}</p>
                </div>
              </div>

              {/* Progress bar */}
              <div className="h-2 bg-navy-700 rounded-full overflow-hidden mb-5">
                <div className="h-full bg-gradient-to-r from-brand-600 to-brand-400 rounded-full progress-bar-inner"
                     style={{ width: `${progress}%` }} />
              </div>
              <p className="text-right text-slate-400 text-xs mb-6">{progress}%</p>

              {/* Step checklist */}
              <div className="space-y-2">
                {steps.map((s, i) => {
                  const done = progress > s.at;
                  const active = !done && (i === 0 || progress > steps[i - 1]?.at);
                  return (
                    <div key={i} className="flex items-center gap-2.5">
                      {done ? (
                        <svg viewBox="0 0 20 20" fill="currentColor" className="w-4 h-4 text-green-400 flex-shrink-0">
                          <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd"/>
                        </svg>
                      ) : active ? (
                        <div className="w-4 h-4 rounded-full border-2 border-brand-400 flex-shrink-0 animate-pulse" />
                      ) : (
                        <div className="w-4 h-4 rounded-full border border-navy-600 flex-shrink-0" />
                      )}
                      <span className={`text-xs ${done ? 'text-slate-300' : active ? 'text-slate-300' : 'text-slate-600'}`}>{s.label}</span>
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// Stats bar
// ═══════════════════════════════════════════════════════════════════
function StatsBar({ stats, matchedLen, unmatchedLen }) {
  const cards = [
    { label: 'Total',     value: stats.total    ?? 0, color: 'text-slate-300', bg: 'bg-navy-700' },
    { label: 'Matched',   value: matchedLen,          color: 'text-green-400', bg: 'bg-green-900/20' },
    { label: 'Unmatched', value: unmatchedLen,         color: 'text-amber-400', bg: 'bg-amber-900/20' },
    { label: 'Skipped',   value: stats.skipped  ?? 0, color: 'text-slate-500', bg: 'bg-navy-700/50' },
    { label: 'Exact',     value: stats.exact    ?? 0, color: 'text-emerald-400', bg: 'bg-emerald-900/20' },
    { label: 'Fuzzy',     value: (stats.fuzzy ?? 0) + (stats.fuzzy_catalogue ?? 0), color: 'text-blue-400', bg: 'bg-blue-900/20' },
  ];
  return (
    <div className="grid grid-cols-3 sm:grid-cols-6 gap-3 mb-6">
      {cards.map((c) => (
        <div key={c.label} className={`${c.bg} rounded-xl p-3 text-center border border-white/5`}>
          <p className={`text-xl font-bold ${c.color}`}>{c.value}</p>
          <p className="text-slate-500 text-xs mt-0.5">{c.label}</p>
        </div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// Inline editable cell
// ═══════════════════════════════════════════════════════════════════
function EditableCell({ value, onSave, placeholder }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value);
  const inputRef = useRef(null);

  useEffect(() => { setDraft(value); }, [value]);
  useEffect(() => { if (editing) inputRef.current?.focus(); }, [editing]);

  const commit = () => {
    setEditing(false);
    if (draft.trim() !== value) onSave(draft.trim());
  };

  if (editing) {
    return (
      <input
        ref={inputRef}
        value={draft}
        onChange={(e) => setDraft(e.target.value)}
        onBlur={commit}
        onKeyDown={(e) => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') { setDraft(value); setEditing(false); } }}
        className="w-full bg-navy-900 border border-brand-500 rounded px-2 py-1 text-sm text-white focus:ring-1 focus:ring-brand-400"
        placeholder={placeholder || 'Type catalogue name…'}
      />
    );
  }

  return (
    <span
      className="cursor-text group/cell flex items-center gap-1 min-h-[24px]"
      onClick={() => setEditing(true)}
    >
      <span className={`text-sm ${value ? 'text-slate-200' : 'text-slate-600 italic'}`}>
        {value || placeholder || '—'}
      </span>
      <svg viewBox="0 0 16 16" fill="currentColor" className="w-3 h-3 text-slate-600 opacity-0 group-hover/cell:opacity-100 flex-shrink-0">
        <path d="M11.013 1.427a1.75 1.75 0 012.474 0l1.086 1.086a1.75 1.75 0 010 2.474l-8.61 8.61c-.21.21-.47.364-.756.445l-3.251.93a.75.75 0 01-.927-.928l.929-3.25c.081-.286.235-.547.445-.758l8.61-8.61z"/>
      </svg>
    </span>
  );
}

// ═══════════════════════════════════════════════════════════════════
// Matched Table
// ═══════════════════════════════════════════════════════════════════
const PAGE_SIZE = 25;

function MatchedTable({ rows, onReject, onEdit }) {
  const [search, setSearch] = useState('');
  const [page, setPage] = useState(1);

  const filtered = useMemo(() =>
    rows.filter(r =>
      !search || r.provider_name.toLowerCase().includes(search.toLowerCase()) ||
      r.catalogue_name.toLowerCase().includes(search.toLowerCase())
    ), [rows, search]);

  const total_pages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const safe_page = Math.min(page, total_pages);
  const visible = filtered.slice((safe_page - 1) * PAGE_SIZE, safe_page * PAGE_SIZE);

  return (
    <div className="bg-navy-800 rounded-2xl border border-navy-600 overflow-hidden">
      {/* header */}
      <div className="flex items-center justify-between px-5 py-4 border-b border-navy-600 gap-3">
        <div className="flex items-center gap-2">
          <div className="w-2.5 h-2.5 rounded-full bg-green-400" />
          <h2 className="font-semibold text-white text-sm">Matched</h2>
          <span className="text-xs text-slate-500 bg-navy-700 px-2 py-0.5 rounded-full">{rows.length}</span>
        </div>
        <input
          value={search}
          onChange={(e) => { setSearch(e.target.value); setPage(1); }}
          placeholder="Search…"
          className="bg-navy-900 border border-navy-600 rounded-lg px-3 py-1.5 text-sm text-slate-200 placeholder-slate-600 focus:border-brand-500 w-48"
        />
      </div>

      {/* table */}
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="border-b border-navy-700">
              <th className="text-left px-4 py-2.5 text-slate-500 font-medium text-xs w-8">#</th>
              <th className="text-left px-4 py-2.5 text-slate-500 font-medium text-xs">Provider Test Name</th>
              <th className="text-left px-4 py-2.5 text-slate-500 font-medium text-xs">Catalogue Name</th>
              <th className="text-left px-4 py-2.5 text-slate-500 font-medium text-xs w-28">Type</th>
              <th className="text-left px-4 py-2.5 text-slate-500 font-medium text-xs w-16">Score</th>
              <th className="px-4 py-2.5 w-20" />
            </tr>
          </thead>
          <tbody>
            {visible.length === 0 ? (
              <tr><td colSpan={6} className="text-center text-slate-600 py-10 text-sm">No rows</td></tr>
            ) : visible.map((row, i) => (
              <tr key={row.id} className="table-row-hover border-b border-navy-700/50 transition-colors">
                <td className="px-4 py-2.5 text-slate-600 text-xs">
                  {(safe_page - 1) * PAGE_SIZE + i + 1}
                </td>
                <td className="px-4 py-2.5 text-slate-300 max-w-xs">
                  <span className="line-clamp-1" title={row.provider_name}>{row.provider_name}</span>
                  {row.user_edited && (
                    <span className="ml-2 text-xs text-amber-400 bg-amber-900/30 px-1.5 py-0.5 rounded">edited</span>
                  )}
                </td>
                <td className="px-4 py-2.5 max-w-xs">
                  <EditableCell
                    value={row.catalogue_name}
                    onSave={(v) => onEdit(row.id, v)}
                    placeholder="Enter catalogue name…"
                  />
                </td>
                <td className="px-4 py-2.5">
                  <span className={`text-xs px-2 py-0.5 rounded-full font-mono font-medium ${badge_class(row.match_type)}`}>
                    {badge_label(row.match_type)}
                  </span>
                </td>
                <td className="px-4 py-2.5 text-slate-400 text-xs font-mono">
                  {row.confidence ? fmt_pct(row.confidence) : '—'}
                </td>
                <td className="px-4 py-2.5 text-right">
                  <button
                    onClick={() => onReject(row.id)}
                    className="text-xs px-2.5 py-1 rounded-md border border-red-800 text-red-400 hover:bg-red-900/40 transition-colors"
                  >Reject</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* pagination */}
      {total_pages > 1 && (
        <Pagination page={safe_page} total={total_pages} onChange={setPage} />
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// Unmatched Table
// ═══════════════════════════════════════════════════════════════════
function UnmatchedTable({ rows, onApprove, onEditSuggested }) {
  const [search, setSearch] = useState('');
  const [page, setPage] = useState(1);

  const filtered = useMemo(() =>
    rows.filter(r =>
      !search || r.provider_name.toLowerCase().includes(search.toLowerCase()) ||
      (r.suggested_name || '').toLowerCase().includes(search.toLowerCase())
    ), [rows, search]);

  const total_pages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const safe_page = Math.min(page, total_pages);
  const visible = filtered.slice((safe_page - 1) * PAGE_SIZE, safe_page * PAGE_SIZE);

  return (
    <div className="bg-navy-800 rounded-2xl border border-navy-600 overflow-hidden">
      <div className="flex items-center justify-between px-5 py-4 border-b border-navy-600 gap-3">
        <div className="flex items-center gap-2">
          <div className="w-2.5 h-2.5 rounded-full bg-amber-400" />
          <h2 className="font-semibold text-white text-sm">Unmatched</h2>
          <span className="text-xs text-slate-500 bg-navy-700 px-2 py-0.5 rounded-full">{rows.length}</span>
          <span className="text-xs text-slate-600">— Enter a catalogue name and approve to move to Matched</span>
        </div>
        <input
          value={search}
          onChange={(e) => { setSearch(e.target.value); setPage(1); }}
          placeholder="Search…"
          className="bg-navy-900 border border-navy-600 rounded-lg px-3 py-1.5 text-sm text-slate-200 placeholder-slate-600 focus:border-brand-500 w-48"
        />
      </div>

      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="border-b border-navy-700">
              <th className="text-left px-4 py-2.5 text-slate-500 font-medium text-xs w-8">#</th>
              <th className="text-left px-4 py-2.5 text-slate-500 font-medium text-xs">Provider Test Name</th>
              <th className="text-left px-4 py-2.5 text-slate-500 font-medium text-xs">Catalogue Name (enter to approve)</th>
              <th className="px-4 py-2.5 w-24" />
            </tr>
          </thead>
          <tbody>
            {visible.length === 0 ? (
              <tr>
                <td colSpan={4} className="text-center py-12">
                  <svg viewBox="0 0 24 24" fill="none" className="w-10 h-10 text-green-400/30 mx-auto mb-2" stroke="currentColor" strokeWidth="1.5">
                    <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                  </svg>
                  <p className="text-slate-600 text-sm">All items matched!</p>
                </td>
              </tr>
            ) : visible.map((row, i) => (
              <tr key={row.id} className="table-row-hover border-b border-navy-700/50">
                <td className="px-4 py-2.5 text-slate-600 text-xs">
                  {(safe_page - 1) * PAGE_SIZE + i + 1}
                </td>
                <td className="px-4 py-2.5 text-slate-300 max-w-xs">
                  <span className="line-clamp-1" title={row.provider_name}>{row.provider_name}</span>
                </td>
                <td className="px-4 py-2.5 max-w-sm">
                  <EditableCell
                    value={row.suggested_name || ''}
                    onSave={(v) => onEditSuggested(row.id, v)}
                    placeholder="Type catalogue name to approve…"
                  />
                </td>
                <td className="px-4 py-2.5 text-right">
                  <button
                    onClick={() => onApprove(row.id)}
                    className="text-xs px-2.5 py-1 rounded-md border border-green-800 text-green-400 hover:bg-green-900/40 transition-colors"
                  >Approve</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {total_pages > 1 && (
        <Pagination page={safe_page} total={total_pages} onChange={setPage} />
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// Pagination
// ═══════════════════════════════════════════════════════════════════
function Pagination({ page, total, onChange }) {
  return (
    <div className="flex items-center justify-between px-5 py-3 border-t border-navy-700">
      <span className="text-xs text-slate-500">Page {page} of {total}</span>
      <div className="flex gap-2">
        <button
          disabled={page === 1}
          onClick={() => onChange(page - 1)}
          className="text-xs px-3 py-1 rounded bg-navy-700 text-slate-300 hover:bg-navy-600 disabled:opacity-30 disabled:cursor-not-allowed"
        >← Prev</button>
        <button
          disabled={page === total}
          onClick={() => onChange(page + 1)}
          className="text-xs px-3 py-1 rounded bg-navy-700 text-slate-300 hover:bg-navy-600 disabled:opacity-30 disabled:cursor-not-allowed"
        >Next →</button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// Reconciliation Dashboard
// ═══════════════════════════════════════════════════════════════════
function ReconciliationDashboard({ filename, matched, unmatched, stats, onFinalize }) {
  const [matchedRows, setMatchedRows] = useState(matched);
  const [unmatchedRows, setUnmatchedRows] = useState(unmatched);
  const [corrections, setCorrections] = useState([]);
  const [finalizing, setFinalizing] = useState(false);

  // Reject: matched → unmatched
  const handleReject = useCallback((id) => {
    setMatchedRows(prev => {
      const row = prev.find(r => r.id === id);
      if (!row) return prev;
      setCorrections(c => [...c, {
        type: 'rejected',
        provider_name: row.provider_name,
        old_catalogue_name: row.catalogue_name,
        new_catalogue_name: '',
      }]);
      setUnmatchedRows(u => [{
        ...row,
        match_type: 'UNMATCHED',
        suggested_name: row.catalogue_name,
      }, ...u]);
      return prev.filter(r => r.id !== id);
    });
  }, []);

  // Edit matched row's catalogue name
  const handleEditMatched = useCallback((id, newName) => {
    setMatchedRows(prev => prev.map(r => {
      if (r.id !== id) return r;
      setCorrections(c => [...c, {
        type: 'edited',
        provider_name: r.provider_name,
        old_catalogue_name: r.catalogue_name,
        new_catalogue_name: newName,
      }]);
      return { ...r, catalogue_name: newName, user_edited: true };
    }));
  }, []);

  // Edit suggested name for unmatched row
  const handleEditSuggested = useCallback((id, newName) => {
    setUnmatchedRows(prev => prev.map(r =>
      r.id === id ? { ...r, suggested_name: newName } : r
    ));
  }, []);

  // Approve: unmatched → matched
  const handleApprove = useCallback((id) => {
    setUnmatchedRows(prev => {
      const row = prev.find(r => r.id === id);
      if (!row) return prev;
      const catName = row.suggested_name?.trim() || '';
      setCorrections(c => [...c, {
        type: 'approved',
        provider_name: row.provider_name,
        old_catalogue_name: '',
        new_catalogue_name: catName,
      }]);
      setMatchedRows(m => [...m, {
        ...row,
        catalogue_name: catName,
        match_type: 'UNMATCHED',
        confidence: 0,
        user_edited: true,
      }]);
      return prev.filter(r => r.id !== id);
    });
  }, []);

  const handleFinalize = () => {
    setFinalizing(true);
    onFinalize(matchedRows, unmatchedRows, corrections);
  };

  return (
    <div className="px-4 sm:px-6 py-6 max-w-7xl mx-auto fade-in">
      {/* Page title */}
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-lg font-semibold text-white">Reconciliation Dashboard</h1>
          <p className="text-slate-500 text-sm mt-0.5">{filename}</p>
        </div>
        <button
          onClick={handleFinalize}
          disabled={finalizing}
          className="flex items-center gap-2 bg-brand-600 hover:bg-brand-500 disabled:opacity-60 text-white px-5 py-2 rounded-xl font-medium text-sm transition-colors shadow-lg"
        >
          {finalizing ? (
            <svg className="animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
          ) : (
            <svg viewBox="0 0 20 20" fill="currentColor" className="w-4 h-4">
              <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd"/>
            </svg>
          )}
          Finalise
        </button>
      </div>

      <StatsBar stats={stats} matchedLen={matchedRows.length} unmatchedLen={unmatchedRows.length} />

      <div className="space-y-6">
        <MatchedTable
          rows={matchedRows}
          onReject={handleReject}
          onEdit={handleEditMatched}
        />
        <UnmatchedTable
          rows={unmatchedRows}
          onApprove={handleApprove}
          onEditSuggested={handleEditSuggested}
        />
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// Finalize Screen
// ═══════════════════════════════════════════════════════════════════
function FinalizeScreen({ finalData, downloadUrl, outputFilename, learningSummary, onReset }) {
  const { matched, stats } = finalData;
  const [search, setSearch] = useState('');
  const [page, setPage] = useState(1);

  const filtered = useMemo(() =>
    matched.filter(r =>
      !search ||
      r.provider_name.toLowerCase().includes(search.toLowerCase()) ||
      r.catalogue_name.toLowerCase().includes(search.toLowerCase())
    ), [matched, search]);

  const total_pages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const safe_page = Math.min(page, total_pages);
  const visible = filtered.slice((safe_page - 1) * PAGE_SIZE, safe_page * PAGE_SIZE);

  return (
    <div className="px-4 sm:px-6 py-6 max-w-7xl mx-auto fade-in">
      {/* Success banner */}
      <div className="bg-green-900/20 border border-green-800/40 rounded-2xl px-6 py-5 mb-6 flex items-start gap-4">
        <div className="w-10 h-10 rounded-full bg-green-500/10 flex items-center justify-center flex-shrink-0">
          <svg viewBox="0 0 20 20" fill="currentColor" className="w-6 h-6 text-green-400">
            <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd"/>
          </svg>
        </div>
        <div className="flex-1 min-w-0">
          <p className="font-semibold text-green-300">Reconciliation complete</p>
          <p className="text-slate-400 text-sm mt-1">
            {matched.length} matched · {finalData.unmatched?.length ?? 0} unmatched
            {stats.skipped ? ` · ${stats.skipped} skipped` : ''}
          </p>
          {learningSummary.length > 0 && (
            <div className="mt-3 space-y-1">
              {learningSummary.map((s, i) => (
                <p key={i} className="text-xs text-slate-500 flex items-center gap-1.5">
                  <svg viewBox="0 0 16 16" fill="currentColor" className="w-3 h-3 text-brand-400 flex-shrink-0">
                    <path d="M8 0a8 8 0 110 16A8 8 0 018 0zm.93 6.588l-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533L8.93 6.588z"/>
                  </svg>
                  {s}
                </p>
              ))}
            </div>
          )}
        </div>
        <div className="flex gap-3 flex-shrink-0">
          <a
            href={downloadUrl}
            download={outputFilename}
            className="flex items-center gap-2 bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-xl text-sm font-medium transition-colors"
          >
            <svg viewBox="0 0 20 20" fill="currentColor" className="w-4 h-4">
              <path fillRule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clipRule="evenodd"/>
            </svg>
            Download Excel
          </a>
          <button
            onClick={onReset}
            className="border border-navy-600 text-slate-400 hover:text-white hover:border-slate-500 px-4 py-2 rounded-xl text-sm transition-colors"
          >New File</button>
        </div>
      </div>

      {/* Preview table */}
      <div className="bg-navy-800 rounded-2xl border border-navy-600 overflow-hidden">
        <div className="flex items-center justify-between px-5 py-4 border-b border-navy-600 gap-3">
          <div className="flex items-center gap-2">
            <h2 className="font-semibold text-white text-sm">Final Matched List</h2>
            <span className="text-xs text-slate-500 bg-navy-700 px-2 py-0.5 rounded-full">{matched.length} rows</span>
          </div>
          <input
            value={search}
            onChange={(e) => { setSearch(e.target.value); setPage(1); }}
            placeholder="Search…"
            className="bg-navy-900 border border-navy-600 rounded-lg px-3 py-1.5 text-sm text-slate-200 placeholder-slate-600 focus:border-brand-500 w-48"
          />
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="border-b border-navy-700">
                <th className="text-left px-4 py-2.5 text-slate-500 font-medium text-xs w-8">#</th>
                <th className="text-left px-4 py-2.5 text-slate-500 font-medium text-xs">Provider Test Name</th>
                <th className="text-left px-4 py-2.5 text-slate-500 font-medium text-xs">Catalogue Name</th>
                <th className="text-left px-4 py-2.5 text-slate-500 font-medium text-xs w-28">Type</th>
                <th className="text-left px-4 py-2.5 text-slate-500 font-medium text-xs w-16">Score</th>
              </tr>
            </thead>
            <tbody>
              {visible.map((row, i) => (
                <tr key={row.id} className="border-b border-navy-700/50 table-row-hover">
                  <td className="px-4 py-2.5 text-slate-600 text-xs">{(safe_page - 1) * PAGE_SIZE + i + 1}</td>
                  <td className="px-4 py-2.5 text-slate-300 max-w-xs">
                    <span className="line-clamp-1">{row.provider_name}</span>
                  </td>
                  <td className="px-4 py-2.5 text-slate-200 max-w-xs">
                    <span className="line-clamp-1">{row.catalogue_name || '—'}</span>
                    {row.user_edited && (
                      <span className="ml-2 text-xs text-amber-400 bg-amber-900/30 px-1.5 py-0.5 rounded">edited</span>
                    )}
                  </td>
                  <td className="px-4 py-2.5">
                    <span className={`text-xs px-2 py-0.5 rounded-full font-mono font-medium ${badge_class(row.match_type)}`}>
                      {badge_label(row.match_type)}
                    </span>
                  </td>
                  <td className="px-4 py-2.5 text-slate-400 text-xs font-mono">
                    {row.confidence ? fmt_pct(row.confidence) : '—'}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {total_pages > 1 && <Pagination page={safe_page} total={total_pages} onChange={setPage} />}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// Root App
// ═══════════════════════════════════════════════════════════════════
function App() {
  const [phase, setPhase] = useState('upload');
  const [jobId, setJobId] = useState(null);
  const [progress, setProgress] = useState(0);
  const [progressStep, setProgressStep] = useState('');
  const [processError, setProcessError] = useState(null);
  const [filename, setFilename] = useState('');

  const [matched, setMatched] = useState([]);
  const [unmatched, setUnmatched] = useState([]);
  const [stats, setStats] = useState({});

  const [finalData, setFinalData] = useState(null);
  const [downloadUrl, setDownloadUrl] = useState('');
  const [outputFilename, setOutputFilename] = useState('');
  const [learningSummary, setLearningSummary] = useState([]);

  const sseRef = useRef(null);

  // Upload handler
  const handleUpload = async (file) => {
    setFilename(file.name);
    setPhase('processing');
    setProgress(0);
    setProgressStep('Uploading…');
    setProcessError(null);

    const formData = new FormData();
    formData.append('file', file);

    let jid;
    try {
      const res = await fetch('/api/upload', { method: 'POST', body: formData });
      if (!res.ok) throw new Error(`Upload failed: ${res.statusText}`);
      const data = await res.json();
      jid = data.job_id;
      setJobId(jid);
    } catch (e) {
      setProcessError(e.message);
      return;
    }

    // Open SSE stream
    const es = new EventSource(`/api/status/${jid}`);
    sseRef.current = es;

    es.onmessage = (e) => {
      const d = JSON.parse(e.data);
      setProgress(d.progress ?? 0);
      setProgressStep(d.step ?? '');

      if (d.status === 'done') {
        es.close();
        fetchResults(jid);
      } else if (d.status === 'error') {
        es.close();
        setProcessError(d.error || 'Unknown error');
      }
    };

    es.onerror = () => {
      es.close();
      // Fallback: poll once
      setTimeout(() => fetchResults(jid), 1000);
    };
  };

  const fetchResults = async (jid) => {
    try {
      const res = await fetch(`/api/results/${jid}`);
      const data = await res.json();
      if (data.status === 'error') {
        setProcessError(data.error || 'Processing failed');
        return;
      }
      setMatched(data.matched || []);
      setUnmatched(data.unmatched || []);
      setStats(data.stats || {});
      setPhase('reconcile');
    } catch (e) {
      setProcessError(e.message);
    }
  };

  const handleFinalize = async (matchedRows, unmatchedRows, corrections) => {
    try {
      const res = await fetch(`/api/finalize/${jobId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ matched: matchedRows, unmatched: unmatchedRows, corrections }),
      });
      if (!res.ok) throw new Error(`Finalize failed: ${res.statusText}`);
      const data = await res.json();
      setDownloadUrl(data.download_url);
      setOutputFilename(data.output_filename);
      setLearningSummary(data.learning_summary || []);
      setFinalData({ matched: matchedRows, unmatched: unmatchedRows, stats });
      setPhase('finalize');
    } catch (e) {
      alert(`Error: ${e.message}`);
    }
  };

  const handleReset = () => {
    if (sseRef.current) sseRef.current.close();
    setPhase('upload');
    setJobId(null);
    setProgress(0);
    setProgressStep('');
    setProcessError(null);
    setFilename('');
    setMatched([]);
    setUnmatched([]);
    setStats({});
    setFinalData(null);
    setDownloadUrl('');
    setOutputFilename('');
    setLearningSummary([]);
  };

  return (
    <div className="min-h-screen bg-navy-900">
      <Header phase={phase} />
      {phase === 'upload' && (
        <UploadPhase onUpload={handleUpload} />
      )}
      {phase === 'processing' && (
        <ProcessingPhase
          filename={filename}
          progress={progress}
          step={progressStep}
          error={processError}
        />
      )}
      {phase === 'reconcile' && (
        <ReconciliationDashboard
          filename={filename}
          matched={matched}
          unmatched={unmatched}
          stats={stats}
          onFinalize={handleFinalize}
        />
      )}
      {phase === 'finalize' && finalData && (
        <FinalizeScreen
          finalData={finalData}
          downloadUrl={downloadUrl}
          outputFilename={outputFilename}
          learningSummary={learningSummary}
          onReset={handleReset}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
